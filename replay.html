<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Replay</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Trebuchet MS',system-ui,sans-serif;background:#fff;color:#222;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;height:100vh}

/* ── Header ── */
#header{background:#f7f7f7;border-bottom:1px solid #ddd;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0}
#header h1{font-size:17px;font-weight:700;color:#c0392b;white-space:nowrap}
#load-btn{background:#fff;color:#333;border:1px solid #c0392b;padding:5px 13px;border-radius:4px;cursor:pointer;font-size:13px;transition:background .2s,color .2s}
#load-btn:hover{background:#c0392b;color:#fff}
#file-input{display:none}
#participant-select{background:#fff;color:#333;border:1px solid #ccc;padding:5px 10px;border-radius:4px;font-size:13px;min-width:160px}
#participant-select:disabled{opacity:.45}
#puzzle-tabs{display:flex;gap:4px}
.tab-btn{background:#fff;color:#aaa;border:1px solid #ddd;padding:5px 15px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s}
.tab-btn.available{color:#666;border-color:#bbb}
.tab-btn.active{background:#c0392b;color:#fff;border-color:#c0392b}
.tab-btn:disabled{cursor:default;opacity:.35}
.tab-btn.available:not(:disabled):not(.active):hover{background:#f5f5f5;color:#333}

/* ── Main ── */
#main{display:flex;flex:1;min-height:0;overflow:hidden}

/* ── Grid panel ── */
#grid-panel{flex:0 0 420px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 20px;background:#fff;min-width:300px}
#game-info{display:flex;gap:10px;align-items:center;margin-bottom:10px;font-size:13px;min-height:22px;flex-wrap:wrap}
#level-label{font-weight:700;color:#c0392b;font-size:14px}
#dir-label,#gs-label,#chunk-label{color:#999;font-size:12px}
#grid-display{display:grid;gap:2px;background:#ccc;padding:2px;border:2px solid #ccc;border-radius:2px}
.gc{display:flex;align-items:center;justify-content:center;position:relative;font-weight:700;cursor:default;user-select:none}
#grid-placeholder{color:#bbb;font-size:14px;padding:60px 30px;text-align:center;background:#fafafa;border:2px dashed #e0e0e0}

/* ── Grid wrap & ripple ── */
#grid-wrap{position:relative;display:inline-block}
#ripple-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;align-items:center;justify-content:center;z-index:10}
.ripple{position:absolute;border-radius:50%;border:7px solid #32CD32;opacity:0}
@keyframes winRipple{0%{width:0;height:0;opacity:0}10%{width:40px;height:40px;opacity:.8}100%{width:400px;height:400px;opacity:0}}
#win-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:5}
#win-message{margin-top:8px;font-size:13px;font-weight:700;color:#27ae60;display:none;text-align:center;letter-spacing:.5px}

/* ── Legend ── */
#legend{margin-top:10px;font-size:11px;color:#aaa;display:flex;flex-wrap:wrap;gap:6px;max-width:420px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-swatch{width:12px;height:12px;border-radius:2px;border:1px solid rgba(0,0,0,.12);flex-shrink:0}

/* ── Transcript ── */
#transcript-panel{flex:1;display:flex;flex-direction:column;background:#fafafa;border-left:1px solid #e0e0e0;min-width:260px}
#transcript-panel h3{padding:8px 14px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#bbb;border-bottom:1px solid #e8e8e8;flex-shrink:0}
#transcript-scroll{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:#ddd #fafafa}
.tseg{padding:7px 10px;border-radius:4px;margin-bottom:5px;border-left:3px solid transparent;transition:background .2s,border-color .2s}
.tseg .ts{font-size:10px;color:#ccc;font-weight:700;display:block;margin-bottom:2px}
.tseg .txt{font-size:13px;color:#888;line-height:1.5}
.tseg.active{background:#fff5f5;border-left-color:#c0392b}
.tseg.active .txt{color:#222}
.tseg.active .ts{color:#c0392b}

/* ── Controls ── */
#controls{background:#f7f7f7;border-top:1px solid #ddd;padding:8px 16px 10px;flex-shrink:0}
#pb-row{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.cb{background:#fff;color:#555;border:1px solid #ddd;width:34px;height:34px;border-radius:4px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.cb:hover:not(:disabled){background:#eee}
.cb:disabled{opacity:.3;cursor:default}
#btn-play{background:#c0392b;border-color:#c0392b;color:#fff;width:42px;height:42px;font-size:18px}
#btn-play:hover{background:#a93226}
.speed-section{display:flex;align-items:center;gap:3px;margin-left:10px}
.speed-section span{font-size:11px;color:#bbb;margin-right:3px}
.spd{background:#fff;color:#aaa;border:1px solid #ddd;padding:3px 7px;border-radius:3px;cursor:pointer;font-size:12px;transition:all .15s}
.spd.active{background:#eee;color:#333;border-color:#999}
.spd:hover:not(.active){background:#f5f5f5;color:#666}

/* Timeline */
#tl-wrapper{margin:4px 0;position:relative;height:24px;cursor:pointer}
#tl-track{position:absolute;top:50%;left:0;right:0;height:5px;background:#e0e0e0;border-radius:3px;transform:translateY(-50%)}
#tl-fill{height:100%;background:#c0392b;border-radius:3px;width:0%;pointer-events:none}
#tl-scrubber{position:absolute;top:50%;width:13px;height:13px;background:#c0392b;border-radius:50%;transform:translate(-50%,-50%);left:0%;box-shadow:0 0 4px rgba(0,0,0,.25);pointer-events:none}
.lv-marker{position:absolute;top:0;width:2px;height:24px;background:#e67e22;opacity:.8;transform:translateX(-50%);pointer-events:none}
.lv-marker-lbl{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);font-size:9px;color:#e67e22;white-space:nowrap;margin-bottom:1px}

/* Level jump & status */
#lj-row{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
#lj-row span{font-size:11px;color:#bbb}
.ljb{background:#fff;color:#aaa;border:1px solid #ddd;padding:2px 9px;border-radius:3px;cursor:pointer;font-size:12px;transition:all .15s}
.ljb:hover{background:#f0f0f0;color:#555}
.ljb.cur{background:#eee;color:#333;border-color:#999}
#stat-row{display:flex;align-items:center;gap:14px;margin-top:5px;font-size:11px;flex-wrap:wrap}
#move-ctr{color:#bbb}
#elapsed{color:#2980b9;font-variant-numeric:tabular-nums}
#kb-hint{color:#ccc;flex:1;text-align:right}
</style>
</head>
<body>

<div id="header">
  <h1>Puzzle Replay</h1>
  <input type="file" id="file-input" webkitdirectory multiple>
  <button id="load-btn">📂 Load Data Folder</button>
  <select id="participant-select" disabled>
    <option value=""> Select Participant </option>
  </select>
  <div id="puzzle-tabs">
    <button class="tab-btn" data-puzzle="gA" disabled>Puzzle A</button>
    <button class="tab-btn" data-puzzle="gB" disabled>Puzzle B</button>
    <button class="tab-btn" data-puzzle="gC" disabled>Puzzle C</button>
  </div>
</div>

<div id="main">
  <div id="grid-panel">

    <div id="grid-wrap">
      <div id="grid-display">
        <div id="grid-placeholder">Load files and select a participant.</div>
      </div>
      <div id="ripple-container"></div>
      <svg id="win-svg"></svg>
    </div>
    <div id="win-message">All levels complete.</div>
    <div id="game-info">
      <span id="level-label">—</span>
      <span id="dir-label"></span>
      <span id="gs-label"></span>
      <span id="chunk-label"></span>
    </div>
  </div>

  <div id="transcript-panel">
    <h3>Transcript</h3>
    <div id="transcript-scroll">
      <div style="color:#bbb;font-size:13px;padding:30px 16px;text-align:center">Load the ALL DATA folder to begin.</div>
    </div>
  </div>
</div>

<div id="controls">
  <div id="pb-row">
    <button class="cb" id="btn-home"   title="First frame (Home)">⏮</button>
    <button class="cb" id="btn-prev10" title="Back 10 (Shift+←)">⏪</button>
    <button class="cb" id="btn-prev"   title="Back 1 (←)">❮</button>
    <button class="cb" id="btn-play"   title="Play / Pause (Space)">▶</button>
    <button class="cb" id="btn-next"   title="Forward 1 (→)">❯</button>
    <button class="cb" id="btn-next10" title="Forward 10 (Shift+→)">⏩</button>
    <button class="cb" id="btn-end"    title="Last frame (End)">⏭</button>
    <div class="speed-section">
      <span>Speed:</span>
      <button class="spd" data-speed="0.5">0.5×</button>
      <button class="spd active" data-speed="1">1×</button>
      <button class="spd" data-speed="2">2×</button>
      <button class="spd" data-speed="4">4×</button>
    </div>
  </div>

  <div id="tl-wrapper">
    <div id="tl-track">
      <div id="tl-fill"></div>
      <div id="tl-scrubber"></div>
    </div>
  </div>

  <div id="lj-row">
    <span>Jump:</span>
    <div id="lj-btns"></div>
  </div>

  <div id="stat-row">
    <span id="move-ctr">Frame — / —</span>
    <span id="elapsed">00:00</span>
    <span id="kb-hint">Space: play/pause · ←/→: step · Shift+←/→: ±10 · [/]: prev/next level</span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────

const COLORS = {
  grey:'#D3D3D3', gray:'#D3D3D3',
  blue:'#ADD8E6', yellow:'#DDCC77', pink:'#FF6B8A',
  lime:'#BBCC33', teal:'#44AA99', rose:'#FF6B8A',
  magenta:'#FF69B4', violet:'#9370DB', orange:'#FF5F15'
};

// gA: corner cell colors by "col,row" key, and target color per level
const GA = {
  1: { c:{'0,0':'teal','5,0':'yellow','0,5':'pink','5,5':'blue'},   t:'blue'   },
  2: { c:{'0,0':'blue','5,0':'lime',  '0,5':'teal','5,5':'pink'},   t:'lime'   },
  3: { c:{'0,0':'yellow','5,0':'blue','0,5':'pink','5,5':'teal'},   t:'pink'   },
  4: { c:{'0,0':'yellow','5,0':'pink','0,5':'teal','5,5':'blue'},   t:'yellow' },
  5: { c:{'0,0':'lime','5,0':'yellow','0,5':'blue','2,5':'pink','2,4':'teal'}, t:'pink' }
};

// gB: goal color per level
const GB_GOAL = { 1:'blue', 2:'teal', 3:'rose', 4:'lime', 5:'violet' };

// gC: goal outline color per level (from game3.html)
const GC_GOAL  = { 1:'#00CC66', 2:'#00CC66', 3:'#00CC66', 4:'#00CC66' };

// gC: track color per level (movable + fixed pieces share this color)
const GC_TRACK   = { 1:'#ADD8E6', 2:'#44AA99', 3:'#BBCC33', 4:'#882255' };

// gC: vehicle color per level
const GC_VEHICLE = { 1:'#DDCC77', 2:'#CC6677', 3:'#332288', 4:'#88CCEE' };

// Max levels per puzzle
const GA_MAX_LEVEL = 5, GB_MAX_LEVEL = 5, GC_MAX_LEVEL = 4;

// gC winning path cells per level (all cells that must be track/vehicle in win state)
const GC_WIN_PATH = {
  1: [[3,0],[3,1],[3,2],[3,3],[3,4],[3,5],[3,6]],
  2: [[0,3],[1,3],[2,3],[3,3],[4,3],[5,3],[6,3],[6,2],[6,1],[6,0]],
  3: [[0,0],[1,0],[1,1],[2,1],[2,2],[3,2],[3,3],[4,3],[4,4],[4,5],[5,5],[5,6],[6,6]],
  4: [[0,3],[1,3],[2,3],[3,2],[3,3],[3,4],[3,5],[3,6],[4,2],[5,0],[5,1],[5,2],[6,0]]
};

// Pre-built hardcoded winning grids for gC (used for win frame display)
function _buildWinGrid(size, cells) {
  const g = Array(size).fill(null).map(() => Array(size).fill('E'));
  for (const [sym, r, c] of cells) g[r][c] = sym;
  return g;
}
const GC_WIN_GRIDS = {
  1: _buildWinGrid(7,[['V',3,0],['M',3,1],['M',3,2],['M',3,3],['F',3,4],['F',3,5],['M',3,6]]),
  2: _buildWinGrid(7,[['V',0,3],['M',1,3],['F',2,3],['M',3,3],['M',4,3],['F',5,3],['M',6,3],['F',6,2],['F',6,1],['M',6,0]]),
  3: _buildWinGrid(7,[['V',0,0],['M',1,0],['M',1,1],['F',2,1],['F',2,2],['F',3,2],['M',3,3],['M',4,3],['M',4,4],['M',4,5],['F',5,5],['F',5,6],['M',6,6]]),
  4: _buildWinGrid(7,[['V',0,3],['M',1,3],['M',2,3],['F',3,2],['F',3,3],['M',3,4],['M',3,5],['V',3,6],['F',4,2],['F',5,0],['M',5,1],['M',5,2],['M',6,0]])
};

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────

const S = {
  data: {},        // { pid: { gA: {gamestate, transcript}, ... } }
  pid: null,
  puzzle: null,
  frames: [],
  transcript: [],
  totalMs: 0,
  cur: 0,          // current frame index
  playing: false,
  speed: 1,
  lastRaf: null,
  playbackMs: 0,
  dragging: false,
  gridBuilt: null  // "CxR" string — track when to rebuild DOM cells
};

// ─────────────────────────────────────────────────────────
// FILE LOADING
// ─────────────────────────────────────────────────────────

document.getElementById('load-btn').onclick = () =>
  document.getElementById('file-input').click();

document.getElementById('file-input').addEventListener('change', async function () {
  const raw = {};
  for (const file of this.files) {
    const m = file.name.match(/^(P\d+)_(g[ABC])_(audio|gamestate|eyetracking)_\d{8}\.(json|txt)$/i);
    if (!m) continue;
    const [, pid, game, type, ext] = m;
    if (type === 'eyetracking') continue;
    if (type === 'audio' && ext !== 'txt') continue;
    if (!raw[pid]) raw[pid] = {};
    if (!raw[pid][game]) raw[pid][game] = {};
    const text = await file.text();
    if (type === 'gamestate') {
      try { raw[pid][game].gs = JSON.parse(text); } catch(e) {}
    } else {
      raw[pid][game].tx = parseTranscript(text);
    }
  }
  // Keep only complete combos (gamestate + non-empty transcript)
  S.data = {};
  for (const [pid, games] of Object.entries(raw)) {
    for (const [game, d] of Object.entries(games)) {
      if (d.gs && d.tx && d.tx.length) {
        if (!S.data[pid]) S.data[pid] = {};
        S.data[pid][game] = d;
      }
    }
  }
  buildDropdown();
  this.value = '';
});

// ─────────────────────────────────────────────────────────
// TRANSCRIPT PARSING
// ─────────────────────────────────────────────────────────

function parseTranscript(raw) {
  const segs = [];
  const lines = raw.split('\n');
  const re = /^(\d{1,2}):(\d{2})$/;
  let i = 0;
  while (i < lines.length) {
    const l = lines[i].trim();
    if (l.startsWith('(Transcribed')) { i++; continue; }
    const m = l.match(re);
    if (m) {
      const sec = +m[1] * 60 + +m[2];
      const parts = [];
      i++;
      while (i < lines.length) {
        const n = lines[i].trim();
        if (n.match(re) || n.startsWith('(Transcribed')) break;
        if (n) parts.push(n);
        i++;
      }
      const txt = parts.join(' ').trim();
      if (txt) segs.push({ sec, txt });
    } else { i++; }
  }
  return segs;
}

// ─────────────────────────────────────────────────────────
// DROPDOWN & TABS
// ─────────────────────────────────────────────────────────

function buildDropdown() {
  const sel = document.getElementById('participant-select');
  sel.innerHTML = '<option value=""> Select Participant </option>';
  Object.keys(S.data).sort().forEach(pid => {
    const o = document.createElement('option');
    o.value = pid; o.textContent = pid;
    sel.appendChild(o);
  });
  sel.disabled = !Object.keys(S.data).length;
}

document.getElementById('participant-select').addEventListener('change', function () {
  pause();
  S.pid = this.value || null;
  refreshTabs();
});

function refreshTabs() {
  document.querySelectorAll('.tab-btn').forEach(b => {
    const ok = !!(S.pid && S.data[S.pid]?.[b.dataset.puzzle]);
    b.disabled = !ok;
    b.classList.toggle('available', ok);
    b.classList.remove('active');
  });
  if (S.pid) {
    const first = ['gA','gB','gC'].find(p => S.data[S.pid]?.[p]);
    if (first) selectPuzzle(first);
  } else {
    clearView();
  }
}

document.querySelectorAll('.tab-btn').forEach(b =>
  b.addEventListener('click', () => { if (!b.disabled) selectPuzzle(b.dataset.puzzle); })
);

function selectPuzzle(p) {
  pause();
  S.puzzle = p;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.puzzle === p)
  );
  loadReplay();
}

// ─────────────────────────────────────────────────────────
// REPLAY LOADING
// ─────────────────────────────────────────────────────────

function loadReplay() {
  const d = S.data[S.pid]?.[S.puzzle];
  if (!d) return;
  const gs = d.gs;
  const t0 = new Date(gs.sessionStart).getTime();
  const raw = gs.movements || gs.events || [];
  S.frames = raw.map(f => ({ ...f, ms: new Date(f.timestamp).getTime() - t0 }));
  // Prepend a synthetic frame at t=0 so the replay always starts from the beginning
  if (S.frames.length > 0) S.frames.unshift({ ...S.frames[0], ms: 0 });
  synthesizeWinFrames(S.frames, S.puzzle);
  S.transcript = d.tx;
  S.cur = 0;
  S.playbackMs = 0;
  S.totalMs = S.frames.length ? S.frames[S.frames.length - 1].ms : 1;
  S.gridBuilt = null;
  S._lastRippleFrame = -1;
  _winOverlayLevel = null;
  buildTranscript();
  buildLevelJumps();
  buildMarkers();
  renderFrame();
}

function clearView() {
  S.frames = []; S.transcript = [];
  document.getElementById('grid-display').innerHTML =
    '<div id="grid-placeholder">Load files and select a participant.</div>';
  document.getElementById('transcript-scroll').innerHTML =
    '<div style="color:#445;font-size:13px;padding:30px 16px;text-align:center">Load files to begin.</div>';
  document.getElementById('lj-btns').innerHTML = '';
  document.getElementById('level-label').textContent = '—';
  document.getElementById('move-ctr').textContent = 'Frame — / —';
  document.getElementById('elapsed').textContent = '00:00';
  setTimeline(0);
  const svg = document.getElementById('win-svg');
  if (svg) svg.innerHTML = '';
  const wm = document.getElementById('win-message');
  if (wm) wm.style.display = 'none';
  _winOverlayLevel = null;
}

// ─────────────────────────────────────────────────────────
// GRID RENDERING
// ─────────────────────────────────────────────────────────

function renderFrame() {
  if (!S.frames.length) return;
  const f = S.frames[S.cur];
  renderGrid(f);
  updateTranscript(f);
  updateStatus(f);
  updateTimeline();
  // Ripple on entering a win frame
  if (f._isWin && S.cur !== S._lastRippleFrame) {
    S._lastRippleFrame = S.cur;
    createRipple();
  }
  // "All levels complete" message
  const wmEl = document.getElementById('win-message');
  if (wmEl) wmEl.style.display = f._isGameComplete ? 'block' : 'none';
}

function renderGrid(f) {
  const g = f.gameStateBefore;
  if (!g) return;
  const rows = g.length, cols = g[0].length;
  const CELL = Math.floor(420 / cols);
  S._lastCell = CELL;
  const container = document.getElementById('grid-display');
  const key = `${cols}x${rows}`;

  if (S.gridBuilt !== key) {
    container.innerHTML = '';
    container.style.gridTemplateColumns = `repeat(${cols},${CELL}px)`;
    container.style.gridTemplateRows    = `repeat(${rows},${CELL}px)`;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        const el = document.createElement('div');
        el.className = 'gc';
        el.id = `gc-${c}-${r}`;
        el.style.width = el.style.height = CELL + 'px';
        el.style.fontSize = Math.floor(CELL * 0.36) + 'px';
        container.appendChild(el);
      }
    S.gridBuilt = key;
  }

  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      styleCell(document.getElementById(`gc-${c}-${r}`), g[r][c], c, r, f);

  updateGameInfo(f);
  if (S.puzzle === 'gC') updateWinOverlay(f.level, S._lastCell || Math.floor(420/7));
}

function styleCell(el, sym, col, row, f) {
  el.style.cssText = `width:${el.style.width};height:${el.style.height};font-size:${el.style.fontSize};display:flex;align-items:center;justify-content:center;font-weight:700;cursor:default;user-select:none;`;
  el.innerHTML = '';

  if (S.puzzle === 'gC') { styleCellC(el, sym, f); return; }

  const lv = f.level;
  switch (sym) {
    case 'E':
      el.style.background = '#F5F5F5';
      break;
    case 'A': {
      const col2 = f.colorBefore || 'grey';
      el.style.background = COLORS[col2] || '#D3D3D3';
      el.style.outline = '3px solid #222';
      el.style.outlineOffset = '-3px';
      break;
    }
    case 'G': {
      const gc = goalColor(lv);
      el.style.background = gc;
      el.innerHTML = `<span style="color:#F9F9F9">★</span>`;
      el.style.outline = `4px solid ${gc}`; 
      el.style.outlineOffset = '-4px';
      break;
    }
    case 'R':
      el.style.background = COLORS.teal;
      break;
    case 'M': {
      const mc = S.puzzle === 'gA' && GA[lv] ? COLORS[GA[lv].t] : '#FFD700';
      el.style.background = mc || '#FFD700';
      break;
    }
    case 'C': {
      if (S.puzzle === 'gB') {
        // Force Puzzle B styling specifically
        el.style.background = '#F5F5F5';
        el.style.outline = '3px dotted #666';
        el.style.outlineOffset = '-4px';
        el.innerHTML = '<span style="font-size:.6em;color:#888">C</span>';
      } 
      else if (S.puzzle === 'gA' && GA[lv]) {
        // Puzzle A logic: Solid colors, no outlines
        const cname = GA[lv].c[`${col},${row}`];
        el.style.background = cname ? COLORS[cname] : '#D0D0FF';
      }
      break;
    }
    case 'T':
      el.style.background = '#D3D3D3';
      break;
    case 'D':
      el.style.background = '#F5F5F5';
      el.style.outline = '3px dotted #666';
      el.style.outlineOffset = '-4px';
      el.innerHTML = '<span style="font-size:.65em;color:#666">D</span>';
      break;
    default:
      el.style.background = '#F5F5F5';
  }
}

function styleCellC(el, sym, f) {
  switch (sym) {
    case 'E': el.style.background = '#F5F5F5'; break;
    case 'V':
      el.style.background = GC_VEHICLE[f.level] || '#DDCC77';
      el.style.outline = '3px solid #ADD8E6';
      el.style.outlineOffset = '-3px';
      break;
    case 'M':
      el.style.background = GC_TRACK[f.level] || '#ADD8E6';
      break;
    case 'F':
      el.style.background = GC_TRACK[f.level] || '#ADD8E6';
      el.innerHTML = '<span style="font-size:.6em;opacity:.6;font-weight:800">✕</span>';
      break;
    case 'G':
      el.style.background = '#F5F5F5';
      break;
    default:
      el.style.background = '#F5F5F5';
  }
}

function goalColor(lv) {
  if (S.puzzle === 'gA') return COLORS[GA[lv]?.t] || '#228B22';
  if (S.puzzle === 'gB') return COLORS[GB_GOAL[lv]] || '#228B22';
  return '#228B22';
}

function updateGameInfo(f) {
  document.getElementById('level-label').textContent = `Level ${f.level}`;
  const dir   = document.getElementById('dir-label');
  const gs    = document.getElementById('gs-label');
  const chunk = document.getElementById('chunk-label');

  dir.textContent = gs.textContent = chunk.textContent = '';

  if (S.puzzle === 'gB') {
    if (f.directionCapability) dir.textContent = `dir: ${f.directionCapability}`;
    if (f.currentGameState)    gs.textContent  = `state: ${f.currentGameState}`;
  }
  if (S.puzzle === 'gC') {
    if (f.selectedChunk != null) chunk.textContent = `chunk ${f.selectedChunk}`;
    if (f.action) dir.textContent = f.action.replace(/_/g,' ');
  }
}

function lightness(hex) {
  if (!hex || hex.length < 7) return 200;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000;
}

// ─────────────────────────────────────────────────────────
// TRANSCRIPT
// ─────────────────────────────────────────────────────────

function buildTranscript() {
  const scroll = document.getElementById('transcript-scroll');
  scroll.innerHTML = '';
  if (!S.transcript.length) {
    scroll.innerHTML = '<div style="color:#445;padding:20px;text-align:center">No transcript.</div>';
    return;
  }
  S.transcript.forEach((seg, i) => {
    const d = document.createElement('div');
    d.className = 'tseg';
    d.id = `ts${i}`;
    d.innerHTML = `<span class="ts">${fmt(seg.sec)}</span><span class="txt">${esc(seg.txt)}</span>`;
    scroll.appendChild(d);
  });
  S._lastSeg = -1;
}

function updateTranscript(f) {
  if (!S.transcript.length) return;
  const elapsed = f.ms / 1000;
  let idx = 0;
  for (let i = 0; i < S.transcript.length; i++) {
    if (S.transcript[i].sec <= elapsed) idx = i;
    else break;
  }
  if (idx === S._lastSeg) return;
  S._lastSeg = idx;
  document.querySelectorAll('.tseg').forEach((el, i) =>
    el.classList.toggle('active', i === idx)
  );
  document.getElementById(`ts${idx}`)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ─────────────────────────────────────────────────────────
// TIMELINE
// ─────────────────────────────────────────────────────────

function buildMarkers() {
  document.querySelectorAll('.lv-marker').forEach(m => m.remove());
  if (!S.frames.length) return;
  const wrap = document.getElementById('tl-wrapper');
  let prev = S.frames[0].level;
  S.frames.forEach(f => {
    if (f.level !== prev) {
      const pct = (f.ms / S.totalMs) * 100;
      const m = document.createElement('div');
      m.className = 'lv-marker';
      m.style.left = pct + '%';
      m.innerHTML = `<span class="lv-marker-lbl">L${f.level}</span>`;
      wrap.appendChild(m);
      prev = f.level;
    }
  });
}

function buildLevelJumps() {
  const c = document.getElementById('lj-btns');
  c.innerHTML = '';
  if (!S.frames.length) return;
  [...new Set(S.frames.map(f => f.level))].sort((a,b)=>a-b).forEach(lv => {
    const b = document.createElement('button');
    b.className = 'ljb'; b.textContent = `L${lv}`; b.dataset.lv = lv;
    b.onclick = () => jumpToLevel(lv);
    c.appendChild(b);
  });
}

function jumpToLevel(lv) {
  const i = S.frames.findIndex(f => f.level === lv);
  if (i >= 0) { S.cur = i; renderFrame(); }
}

function updateTimeline() {
  if (!S.frames.length) return;
  const ms = S.playing ? S.playbackMs : S.frames[S.cur].ms;
  setTimeline(ms / S.totalMs);
  const lv = S.frames[S.cur].level;
  document.querySelectorAll('.ljb').forEach(b =>
    b.classList.toggle('cur', +b.dataset.lv === lv)
  );
}

function setTimeline(frac) {
  const pct = (frac * 100).toFixed(2) + '%';
  document.getElementById('tl-fill').style.width = pct;
  document.getElementById('tl-scrubber').style.left = pct;
}

// Timeline drag
const tlWrap = document.getElementById('tl-wrapper');
tlWrap.addEventListener('mousedown', e => { S.dragging = true; seekFrac(tlFrac(e)); });
document.addEventListener('mousemove', e => { if (S.dragging) seekFrac(tlFrac(e)); });
document.addEventListener('mouseup',   () => { S.dragging = false; });

function tlFrac(e) {
  const r = tlWrap.getBoundingClientRect();
  return Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
}
function seekFrac(frac) {
  if (!S.frames.length) return;
  const ms = frac * S.totalMs;
  let best = 0;
  for (let i = 0; i < S.frames.length; i++) {
    if (S.frames[i].ms <= ms) best = i; else break;
  }
  S.cur = best;
  renderFrame();
}

// ─────────────────────────────────────────────────────────
// STATUS BAR
// ─────────────────────────────────────────────────────────

function updateStatus(f) {
  document.getElementById('move-ctr').textContent =
    `Frame ${S.cur + 1} / ${S.frames.length}`;
  document.getElementById('elapsed').textContent =
    fmt(Math.floor((S.playing ? S.playbackMs : f.ms) / 1000));
}

// ─────────────────────────────────────────────────────────
// PLAYBACK
// ─────────────────────────────────────────────────────────

function play() {
  if (!S.frames.length || S.playing) return;
  if (S.cur >= S.frames.length - 1) S.cur = 0;
  S.playbackMs = S.frames[S.cur].ms;
  S._lastRippleFrame = -1;
  S.playing = true;
  S.lastRaf = null;
  document.getElementById('btn-play').textContent = '⏸';
  requestAnimationFrame(raf);
}

function pause() {
  S.playing = false;
  document.getElementById('btn-play').textContent = '▶';
}

function raf(now) {
  if (!S.playing) return;
  if (S.lastRaf !== null) {
    S.playbackMs = Math.min(S.totalMs, S.playbackMs + (now - S.lastRaf) * S.speed);
    while (S.cur < S.frames.length - 1 && S.frames[S.cur + 1].ms <= S.playbackMs) {
      S.cur++;
    }
    renderFrame();
    if (S.playbackMs >= S.totalMs) { pause(); return; }
  }
  S.lastRaf = now;
  requestAnimationFrame(raf);
}

function togglePlay() {
  S.playing ? pause() : play();
}

function step(d) {
  pause();
  S.cur = Math.max(0, Math.min(S.frames.length - 1, S.cur + d));
  renderFrame();
}

function jumpLevel(dir) {
  if (!S.frames.length) return;
  const lv = S.frames[S.cur].level;
  if (dir > 0) {
    const i = S.frames.findIndex((f, idx) => idx > S.cur && f.level > lv);
    if (i >= 0) { S.cur = i; renderFrame(); }
  } else {
    const first = S.frames.findIndex(f => f.level === lv);
    if (S.cur > first) { S.cur = first; renderFrame(); }
    else {
      const i = S.frames.findIndex(f => f.level === lv - 1);
      if (i >= 0) { S.cur = i; renderFrame(); }
    }
  }
}

// ─────────────────────────────────────────────────────────
// BUTTON WIRING
// ─────────────────────────────────────────────────────────

document.getElementById('btn-play').onclick   = togglePlay;
document.getElementById('btn-prev').onclick   = () => step(-1);
document.getElementById('btn-next').onclick   = () => step(1);
document.getElementById('btn-prev10').onclick = () => step(-10);
document.getElementById('btn-next10').onclick = () => step(10);
document.getElementById('btn-home').onclick   = () => { step(-Infinity); };
document.getElementById('btn-end').onclick    = () => { S.cur = S.frames.length - 1; renderFrame(); };

document.querySelectorAll('.spd').forEach(b =>
  b.addEventListener('click', function () {
    S.speed = parseFloat(this.dataset.speed);
    document.querySelectorAll('.spd').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
  })
);

// ─────────────────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  switch (e.key) {
    case ' ':          e.preventDefault(); togglePlay(); break;
    case 'ArrowLeft':  e.preventDefault(); e.shiftKey ? step(-10) : step(-1); break;
    case 'ArrowRight': e.preventDefault(); e.shiftKey ? step(10)  : step(1);  break;
    case '[':          e.preventDefault(); jumpLevel(-1); break;
    case ']':          e.preventDefault(); jumpLevel(1);  break;
    case 'Home':       e.preventDefault(); S.cur = 0; renderFrame(); break;
    case 'End':        e.preventDefault(); S.cur = S.frames.length - 1; renderFrame(); break;
  }
});

// ─────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────

function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────────────────
// RIPPLE
// ─────────────────────────────────────────────────────────

function createRipple() {
  const container = document.getElementById('ripple-container');
  if (!container) return;
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.animation = 'winRipple 1s ease-out forwards';
      container.appendChild(r);
      setTimeout(() => r.remove(), 1000);
    }, i * 200);
  }
}

// ─────────────────────────────────────────────────────────
// WIN FRAME SYNTHESIS
// ─────────────────────────────────────────────────────────

function synthesizeWinFrames(frames, puzzle) {
  const maxLv = puzzle === 'gA' ? GA_MAX_LEVEL : puzzle === 'gB' ? GB_MAX_LEVEL : GC_MAX_LEVEL;
  const inserts = [];

  // Find level transitions and synthesize win frame at each
  for (let i = 1; i < frames.length; i++) {
    const cur = frames[i];
    if (frames[i - 1].level != null && cur.level !== frames[i - 1].level) {
      // For gA/gB: scan backwards within the ending level to find the actual win move
      // (some players buffer extra keys after the win, so last frame may not be the win frame)
      let wf = null;
      const lv = frames[i - 1].level;
      for (let j = i - 1; j >= 0 && frames[j].level === lv && !wf; j--) {
        wf = _makeWinFrame(frames[j], puzzle, false, maxLv);
      }
      if (wf) inserts.push({ idx: i, frame: wf });
    }
  }

  // Try to synthesize final-level win from last recorded frame (scan backwards)
  if (frames.length) {
    const lastLv = frames[frames.length - 1].level;
    let wf = null;
    for (let j = frames.length - 1; j >= 0 && frames[j].level === lastLv && !wf; j--) {
      wf = _makeWinFrame(frames[j], puzzle, true, maxLv);
    }
    if (wf) inserts.push({ idx: frames.length, frame: wf });
  }

  for (let k = inserts.length - 1; k >= 0; k--) {
    frames.splice(inserts[k].idx, 0, inserts[k].frame);
  }
}

function _makeWinFrame(f, puzzle, isLast, maxLv) {
  if (puzzle === 'gC') return _makeGCWinFrame(f, isLast, maxLv);
  return _makeGABWinFrame(f, puzzle, isLast, maxLv);
}

function _makeGABWinFrame(f, puzzle, isLast, maxLv) {
  const gs = f.gameStateBefore;
  const delta = f.delta;
  if (!gs || !delta) return null;

  let ar = -1, ac = -1, gr = -1, gc2 = -1;
  for (let r = 0; r < gs.length; r++)
    for (let c = 0; c < gs[r].length; c++) {
      if (gs[r][c] === 'A') { ar = r; ac = c; }
      if (gs[r][c] === 'G') { gr = r; gc2 = c; }
    }
  if (ar < 0 || gr < 0) return null;

  const nr = ar + delta.dy, nc = ac + delta.dx;
  const rows = gs.length, cols = gs[0].length;
  if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) return null;

  // Always validate win condition (scan may be backwards, so check every candidate)
  const lv = f.level;
  if (puzzle === 'gA') {
    const adj = (Math.abs(nr - gr) + Math.abs(nc - gc2)) === 1;
    if (!adj) return null;
    const targetColor = GA[lv]?.t;
    if (f.colorBefore !== targetColor) return null;
  } else {
    // gB: A must land on G with correct color
    if (nr !== gr || nc !== gc2) return null;
    const goalColor = GB_GOAL[lv];
    if (goalColor && f.colorBefore !== goalColor) return null;
  }

  const newGs = gs.map(row => [...row]);
  newGs[ar][ac] = 'E';
  newGs[nr][nc] = 'A';

  return {
    ...f,
    gameStateBefore: newGs,
    positionBefore: { x: nc, y: nr },
    ms: f.ms,
    _isWin: true,
    _isGameComplete: isLast && f.level === maxLv
  };
}

function _makeGCWinFrame(f, isLast, maxLv) {
  const lv = f.level;
  const winGrid = GC_WIN_GRIDS[lv];
  if (!winGrid) return null;

  if (isLast) {
    // Only synthesize if last action is a chunk move (indicates the winning action)
    if (!f.action || !f.action.startsWith('move_chunk')) return null;
  }

  return {
    ...f,
    gameStateBefore: winGrid,
    ms: f.ms,
    _isWin: true,
    _isGameComplete: isLast && lv === maxLv
  };
}

// ─────────────────────────────────────────────────────────
// gC WIN OVERLAY (SVG boundary of winning path)
// ─────────────────────────────────────────────────────────

let _winOverlayLevel = null;

function updateWinOverlay(lv, cellSize) {
  const svg = document.getElementById('win-svg');
  if (!svg) return;

  // Only recompute when level changes
  if (lv === _winOverlayLevel) return;
  _winOverlayLevel = lv;

  const cells = GC_WIN_PATH[lv];
  if (!cells) { svg.innerHTML = ''; return; }

  const GAP = 2, PAD = 2;
  const UNIT = cellSize + GAP;
  const gridSize = 7;
  const totalPx = PAD + gridSize * UNIT;

  svg.setAttribute('width', totalPx);
  svg.setAttribute('height', totalPx);
  svg.style.width = totalPx + 'px';
  svg.style.height = totalPx + 'px';

  const pathD = _computeCellBoundary(cells, cellSize, GAP, PAD);
  if (!pathD) { svg.innerHTML = ''; return; }

  const goalColor = GC_GOAL[lv] || '#32CD32';
  svg.innerHTML = `<path d="${pathD}" fill="none" stroke="${goalColor}" stroke-width="2.5" stroke-dasharray="6 3" stroke-linejoin="round"/>`;
}

function _computeCellBoundary(cells, cellSize, gap, pad) {
  const UNIT = cellSize + gap;
  const s = new Set(cells.map(([r, c]) => `${r},${c}`));
  // Build directed boundary edges (each exposed face becomes a directed edge so
  // that interior is always to the left when traversing)
  const edgeMap = new Map();

  const key = (x, y) => `${x},${y}`;

  for (const [r, c] of cells) {
    const x0 = pad + c * UNIT, y0 = pad + r * UNIT;
    const x1 = x0 + UNIT,      y1 = y0 + UNIT;
    // top face exposed → travel right
    if (!s.has(`${r-1},${c}`)) edgeMap.set(key(x0,y0), key(x1,y0));
    // right face exposed → travel down
    if (!s.has(`${r},${c+1}`)) edgeMap.set(key(x1,y0), key(x1,y1));
    // bottom face exposed → travel left
    if (!s.has(`${r+1},${c}`)) edgeMap.set(key(x1,y1), key(x0,y1));
    // left face exposed → travel up
    if (!s.has(`${r},${c-1}`)) edgeMap.set(key(x0,y1), key(x0,y0));
  }

  if (!edgeMap.size) return '';

  // Trace all polygons (outer boundary + any holes)
  const visited = new Set();
  const polygons = [];

  for (const startKey of edgeMap.keys()) {
    if (visited.has(startKey)) continue;
    const poly = [];
    let cur = startKey;
    let safety = 0;
    do {
      visited.add(cur);
      poly.push(cur.split(',').map(Number));
      cur = edgeMap.get(cur);
      safety++;
    } while (cur && cur !== startKey && safety < 1000);

    if (poly.length >= 3) polygons.push(poly);
  }

  return polygons.map(poly => {
    let d = `M ${poly[0][0]} ${poly[0][1]}`;
    for (let i = 1; i < poly.length; i++) d += ` L ${poly[i][0]} ${poly[i][1]}`;
    return d + ' Z';
  }).join(' ');
}
